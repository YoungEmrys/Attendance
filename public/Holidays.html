<!DOCTYPE html>
<html>

<head>
  <title>Holiday Manager</title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-store">
  <meta name="theme-color" content="#667eea">

  <link rel="icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json"> 
  <link rel="stylesheet" href="css/notifications.css">
  <link rel="stylesheet" href="css/loader.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/style.css">

  <script src="js/holidays.js"></script>
  <script src="/js/core/db.js"></script>
  <script src="/js/core/sync.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/core/ui.js"></script>
  <script src="js/core/pwa.js"></script>
  <script src="/js/core/data-layer.js"></script>



  <style>

    h2{
      margin-bottom:20px;
    }

    input{
    cursor: pointer; 
    background-color: #ffffff;
    padding:20px; 
    border:1px solid #ccc; 
    border-radius:6px;
    width: auto;
    }

    button:hover{          
      transform: translateY(-2px);        
      box-shadow: 0 10px 10px -4px rgba(0,0,0,0.3);

    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      border-radius: 6px;
    }

    th, td{
      padding:12px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    .grid{
  display: grid;
  gap: 18px;
}

.card {
  background: #ffffff;
  border: 1px solid #eee;
  border-radius: 14px;
  padding: 18px 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

  .form-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
}

@media (min-width: 768px) {
  .form-grid.two {
    grid-template-columns: repeat(2, 1fr);
  }
}
    .delete-btn{
      padding: 10px 10px;
      width: 75px;
      border:none;
      border-radius:6px;
      border: 1px solid #dbdada;
      cursor: pointer;
      transition: all 0.3s ease-in-out;

    }

    .delete-btn:hover{
      background:#e53935;
      color:white;
    }

    .add-btn{
      cursor: pointer; 
    padding:20px; 
    border: 1px solid #dbdada;
    border-radius:6px;
    width: 100%;      
    transition: all 0.3s ease-in-out;

    }

    .add-btn:hover{
            background-color: rgb(14, 198, 54);
    }

    .back{
      border: none;
      border-radius: 8px;
      cursor: pointer;
  padding: 4px 0;
  color: #333;
  background-color: #cfcece;
  width: 50px;
  font-size: 14px;
  text-align: center;
  transition: all 0.3s ease-in-out;
}    

  </style>

</head>

<body onload="initHolidayPage(); checkAuth();">
 
    <div class="topbar">

  <div class="top-left">

    <img style="height: 40px;" src="Upload/p2f logo.png" alt="Logo">

    <div class="user-name">
      <span id="currentUser"></span>
    </div>
  </div>

  <button class="settings-btn" onclick="window.location.href='settings.html'">
    ⚙️
  </button>

</div>

		<div class="navbar" id="navbar">

  <button onclick="window.location.href='index.html'">
  📊 Dashboard
  </button>

  <button onclick="window.location.href='students.html'">
📝 Student Registration
</button>

  <button
onclick="window.location.href='registered-students.html'">
👨‍🎓 Registered Students
</button>

  <button onclick="window.location.href='attendance.html'">
  📋 Attendance
  </button>

  <button onclick="window.location.href='performance.html'">
  ⭐ Student Performance
  </button>

</div>

  <div class="container wide">
<h2>Holiday Calendar</h2>

<div class="form-grid two"> 
  <input type="date" id="holidayDate">
  <input type="text" id="holidayName" placeholder="Holiday Name">
</div>
<br>

  <button class="add-btn" onclick="addHoliday()">
    Add Holiday
  </button>
<br><br>



<table>

  <thead>
    <tr>
      <th>Date</th>
      <th>Name</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody class="card" id="holidaysTable"></tbody>

</table>
</div>

 <div class="bottom-nav">

  <button class="nav-item"onclick="window.location.href='index.html'">
    <span>🏠</span>
    <small>Home</small>
  </button>

  <button class="nav-item" onclick="window.location.href='students.html'">
    <span>📝</span>
    <small>Students</small>
  </button>

  <button class="nav-item" onclick="window.location.href='registered-students.html'">
    <span>👨‍🎓</span>
    <small>Registered</small>
  </button>

  <button class="nav-item" onclick="window.location.href='attendance.html'">
    <span>📋</span>
    <small>Attendance</small>
  </button>

  <button class="nav-item" onclick="window.location.href='performance.html'">
    <span>⭐</span>
    <small>Performance</small>
  </button>

</div>

</body>
</html>
