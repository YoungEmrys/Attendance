<!DOCTYPE html>
<html>
<head>
  <title>Student Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="js/api.js"></script>
  <script src="js/attendance.js"></script>
  <script src="js/auth.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg,#667eea,#764ba2);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .back-btn {
      background: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 15px;
    }

    /* TOP PROFILE BAR */
    .profile-bar {
      display: flex;
      align-items: center;
      gap: 15px;
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .profile-img {
      width: 90px;
      height: 90px;
      border-radius: 12px; 
      object-fit: cover;
      background: #ddd;
    }

    .profile-info h3 {
      margin: 0;
    }

    .profile-info p {
      margin: 4px 0;
      color: #555;
    }

  </style>
</head>

<body onload="checkAuth();">

<div class="container">

  <button class="back-btn" onclick="goBack()">← Back</button>

  <!-- 🔷 PROFILE BAR -->
  <div id="profileBar"></div>

</div>

</body>
</html>
