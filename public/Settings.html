<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Settings</title>

<script src="js/core/settings.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/edit-student.js"></script>
<script src="js/attendance.js"></script>

<style>
/* =========================
   BASE
========================= */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: linear-gradient(135deg, #667eea, #764ba2);
}
/* MAIN CONTAINER */

.container {
  max-width: 1100px;
  margin: auto;
  background: #fff;
  border-radius: 18px;
  padding: 25px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

/* HEADER */
header {
  text-align: center;
  margin-bottom: 25px;
}

header h1 {
  margin: 0;
  font-size: 30px;
}

header p {
  margin-top: 5px;
  color: #666;
}

/* GRID WRAPPER */
#settingsCards {
  display: grid;
  gap: 15px;
}

/* =========================
   CARD DESIGN
========================= */
.card {
  background: #ffffff;
  border: 1px solid #eee;
  border-radius: 14px;
  padding: 18px 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.14);
}

.card button:hover{
  transform: translateY(-3px);
      transition: 0.3s ease-in-out;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
}

.card h2 {
  margin-top: 0;
  margin-bottom: 15px;
  font-size: 18px;
  color: #333;
}

/* =========================
   SUMMARY BOX
========================= */
#settingsSummary {
  background: #f7f7f7;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  color: #444;
}

/* =========================
   FORM LAYOUT
========================= */
label {
  display: block;
  margin: 10px 0;
  font-size: 14px;
  color: #444;
}

/* INPUTS */
input[type="time"],
input[type="number"],
select {
  width: 100%;
  max-width: 280px;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ddd;
  margin-top: 6px;
}

/* INLINE OPTION GROUPS */
.inline-group {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  margin-top: 8px;
}

.inline-group label {
  display: flex;
  align-items: center;
  margin: 0;
  background: #f7f7f7;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* CHECKBOX / RADIO */
input[type="checkbox"],
input[type="radio"] {
  margin-right: 6px;
  transform: scale(1.1);
}

/* SECTION DIVIDER */
.section {
  border-top: 1px solid #eee;
  margin: 15px 0;
  padding-top: 10px;
}

/* BUTTONS */
button {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
  background-color: #eee;
  
}

/* DANGER */
.danger button:hover{
    background: #ff4d4d;
  color: white;

}

/* SYSTEM MESSAGE */
#lockMessage {
  margin-top: 10px;
  color: #b00020;
  font-weight: bold;
  display: none;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  input[type="time"],
  input[type="number"],
  select {
    max-width: 100%;
  }

  .grid { 
    display: grid;
    gap: 10px;
  }

  @media (max-width: 768px) {
  .grid.three{
    grid-template-columns: 1fr;
    }
  }

  .inline-group {
    flex-direction: column;
  }
}

.back{
  padding: 4px 0;
  color: #333;
  background-color: #cfcece;
  width: 50px;
  font-size: 14px;
  text-align: center;
}
</style>
</head>

<body onload="checkAuth()">

<div class="container">

  <!-- HEADER -->

  <button class="back" onclick="window.location.href = 'index.html'">◀⬅</button>
  <header>
    <h1>Settings</h1>
    <p>Control attendance behavior and system rules</p>
  </header>

  <div id="settingsCards">

    <!-- SUMMARY -->
    <section class="card">
      <h2>Current Behavior</h2>
      <div id="settingsSummary">Loading...</div>
    </section>

    <!-- ATTENDANCE RULES -->
    <section class="card">
      <h2>Attendance Rules</h2>

      <label>
        Late After
        <input type="time" id="lateTime">
      </label>

      <label>
        <input type="checkbox" id="graceEnabled">
        Enable Grace Period
      </label>

      <label>
        Grace Until
        <input type="time" id="graceTime">
      </label>

      <div class="section"></div>

      <label>Time Comparison Mode</label>
      <div class="inline-group">
        <label><input type="radio" name="compareMode" value="strict"> Strict</label>
        <label><input type="radio" name="compareMode" value="rounded"> Rounded</label>
      </div>

      <label>
        Default Status
        <select id="defaultStatus">
          <option value="absent">Absent</option>
        </select>
      </label>
    </section>

    <!-- IMPORT BEHAVIOR -->
    <section class="card">
      <h2>Import Behavior</h2>

      <label>Existing Data Handling</label>
      <div class="inline-group">
        <label><input type="radio" name="importMode" value="merge"> Merge</label>
        <label><input type="radio" name="importMode" value="replace"> Replace</label>
        <label><input type="radio" name="importMode" value="skip"> Skip</label>
      </div>

      <label>
        <input type="checkbox" id="autoDetectMonth">
        Auto-detect Month/Year
      </label>

      <label>
        Manual Month
        <input type="number" id="manualMonth">
      </label>

      <label>
        Manual Year
        <input type="number" id="manualYear">
      </label>

      <div class="section"></div>

      <label>Unknown/ Multiple Same IDs Handling</label>
      <div class="inline-group">
        <label><input type="radio" name="unknownMode" value="warn"> Warn </label>
        <label><input type="radio" name="unknownMode" value="block"> Block</label>
      </div>
    </section>

    <!-- IDENTITY -->
    <section class="card">
      <h2>Identity & Matching</h2>

      <label>
        <input type="checkbox" id="autoPad">
        Auto-pad IDs
      </label>

      <label>Match Mode</label>
      <div class="inline-group">
        <label><input type="radio" name="matchMode" value="id"> ID Only</label>
      </div>
    </section>

    <!-- DISPLAY -->
    <section class="card">
      <h2>Interface & Display</h2>

      <label>Display Mode</label>
      <div class="inline-group">
        <label><input type="radio" name="displayMode" value="friendly"> Friendly</label>
        <label><input type="radio" name="displayMode" value="compact"> Compact</label>
      </div>

      <label>Time Format</label>
      <div class="inline-group">
        <label><input type="radio" name="timeFormat" value="12h"> 12-hour</label>
        <label><input type="radio" name="timeFormat" value="24h"> 24-hour</label>
      </div>

      <label>
        <input type="checkbox" id="autoAbsent">
        Auto-mark absent on save
      </label>
    </section>

    <!-- DATA CONTROL -->
    <div class= "card danger button">
      <h2>Attendance Data Control</h2>
      <label>Active or Dormant Mode</label>
      <label>
  <input type="checkbox" id="showInactiveStudents">
  Show Dormant Students
</label>

  <input type="date" id="datePicker" onchange="onDateChange()">
  <span id="lockStatus"></span><br><br>

      <button onclick="clearMonthAttendance()">Clear Month</button>
      <button onclick="fullResetAttendance()">Full Reset</button>
    </div>

    
    <div class="card danger button">
<h2>Restore Backup</h2>
<div class="grid three">

<input type="file" id="restoreFile" accept=".json">

<button onclick="restoreBackup()">
Restore Database
</button>
</div>
<strong><p style="color:red;font-size:14px;">
Warning: This replaces ALL current data.
</p></strong>
</div>

    <!-- SYSTEM -->
    <section class="card">
      <h2>System</h2>

      <label>
        <input type="checkbox" id="lockSettings">
        Lock Settings
      </label>

      <div id="lockMessage">🔒</div>
    </section>


  <section class="card">
  <h2>Actions</h2>
  <div class="grid three">

  <button 
    onmouseover="this.style.background='rgb(14, 201, 14)'; this.style.color='white'" 
    onmouseout="this.style.background='#eee'; this.style.color='black'" 
  id="saveSettingsBtn">Save Settings
  </button>

  <button
    onmouseover="this.style.background='rgb(85, 154, 245)'; this.style.color='white'" 
    onmouseout="this.style.background='#eee'; this.style.color='black'" 
    id="cancelSettingsBtn">Cancel Changes</button>

  <button 
  onmouseover="this.style.background='#ff4d4d'; this.style.color='white'" 
  onmouseout="this.style.background='#eee'; this.style.color='black'" 
  id="resetSettingsBtn">Reset to Defaults
</button>

</div>
</section>


</div>
</div>

<script src="js/settings.js"></script>
</body>
</html>
