<!DOCTYPE html>
<html>
<head>
  <title>Practical Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 0;
    }

    .container {
      width: 95%;
      max-width: 900px;
      margin: 40px auto;
      padding: 30px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    h1, h2 { text-align: center; }

    label {
      font-weight: 600;
      margin-top: 10px;
      display: block;
    }

    input, select {
      width: 100%;
      height: 40px;
      margin: 8px 0 15px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      width: 100%;
      height: 45px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 8px 0;
      font-weight: bold;
      color: white;
      transition: 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    #calculateBtn { background: #4CAF50; }
    #resetBtn { background: #f44336; }
    #viewHistoryBtn { background: #03A9F4; }

    .result-card {
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      background: #f9f9f9;
      border: 1px solid #ddd;
    }

    .progress-container {
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 8px;
      height: 12px;
    }

    .progress-bar {
      height: 12px;
      background: #4CAF50;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Practical Tracker</h1>

  <label>Student Name</label>
  <input id="studentName" type="text">

  <label>Courses</label>
  <select id="courses" multiple>
    <option value="Course 1">Course 1</option>
    <option value="Course 2">Course 2</option>
    <option value="Course 3">Course 3</option>
  </select>

  <label>Total Practicals per Day</label>
  <input id="totalPracs" type="number">

  <label>Exclude Specific Dates (Optional)</label>
  <select id="excludeDays" multiple>
    <script>
      for (let i = 1; i <= 31; i++) {
        document.write(`<option value="${i}">${i}</option>`);
      }
    </script>
  </select>

  <label>Practicals Done</label>
  <input id="donePracs" type="number">

  <label>Select Month</label>
  <select id="monthSelect">
    <script>
      const months = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
      ];
      months.forEach((m, i) => {
        document.write(`<option value="${i}">${m}</option>`);
      });
    </script>
  </select>

  <button id="calculateBtn" onclick="calculate()">Calculate</button>
  <button id="resetBtn" onclick="resetForm()">Reset</button>
  <button id="viewHistoryBtn" onclick="window.location.href='history.html'">View History</button>

  <h2>Results</h2>
  <div id="results"></div>
</div>
<script src="app.js"></script>
<script>
  let history = JSON.parse(localStorage.getItem('history')) || [];

  function getWeekdaysInMonth(year, month, excludeDays) {
    let date = new Date(year, month, 1);
    let count = 0;

    while (date.getMonth() === month) {
      const dayOfWeek = date.getDay();
      const dayOfMonth = date.getDate().toString();

      if (dayOfWeek !== 0 && dayOfWeek !== 6 && !excludeDays.includes(dayOfMonth)) {
        count++;
      }

      date.setDate(date.getDate() + 1);
    }

    return count;
  }

  function calculate() {
    const studentName = document.getElementById('studentName').value.trim();
    const courses = Array.from(document.getElementById('courses').selectedOptions).map(o => o.value);
    const totalPracs = parseInt(document.getElementById('totalPracs').value);
    const donePracs = parseInt(document.getElementById('donePracs').value);
    const excludeDays = Array.from(document.getElementById('excludeDays').selectedOptions).map(o => o.value);
    const selectedMonth = parseInt(document.getElementById('monthSelect').value);
    const year = new Date().getFullYear();

    if (!studentName || courses.length === 0 || 
        isNaN(totalPracs) || isNaN(donePracs)) {
      alert("Please fill all required fields correctly.");
      return;
    }

    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '';

    // ✅ Only selected month calculation
    const weekdays = getWeekdaysInMonth(year, selectedMonth, excludeDays);
    const totalRequired = weekdays * totalPracs;

    courses.forEach(course => {

      const remaining = Math.max(totalRequired - donePracs, 0);
      const percent = totalRequired > 0 
        ? Math.min((donePracs / totalRequired) * 100, 100)
        : 0;

      resultsDiv.innerHTML += `
        <div class="result-card">
          <strong>Course:</strong> ${course}<br>
          Month: ${months[selectedMonth]} ${year}<br>
          Weekdays: ${weekdays}<br>
          Total Required: ${totalRequired}<br>
          Done: ${donePracs}<br>
          Remaining: <strong>${remaining}</strong>

          <div class="progress-container">
            <div class="progress-bar" style="width:${percent}%"></div>
          </div>
          ${percent.toFixed(1)}% Completed
        </div>
      `;

      // ✅ Replace existing entry instead of stacking duplicates
      const existingIndex = history.findIndex(
        h => h.studentName === studentName && 
             h.course === course &&
             h.month === selectedMonth &&
             h.year === year
      );

      const newEntry = {
        studentName,
        course,
        month: selectedMonth,
        year,
        totalRequired,
        donePracs,
        remaining,
        dateCreated: new Date().toLocaleString()
      };

      if (existingIndex !== -1) {
        history[existingIndex] = newEntry;
      } else {
        history.push(newEntry);
      }
    });

    localStorage.setItem('history', JSON.stringify(history));
  }

  function resetForm() {
    document.querySelectorAll('input').forEach(i => i.value = '');
    document.querySelectorAll('select').forEach(s => s.selectedIndex = -1);
    document.getElementById('results').innerHTML = '';
  }
</script>

</body>
</html>
