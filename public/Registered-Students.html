<html>
<head>

<style>

#imagePreview { 
  margin-top:10px; 
  max-width:150px; 
  border-radius:8px; 
}

.student-Crs {display:flex; 
  gap:5px; 
  align-items:center;
}

.plus{
   background-color: #ffffff; 
   border:1px solid #ccc; 
  border-radius:6px;
  padding: 20px 8px;
  cursor: pointer;

}

.plus:hover{
     background-color: #e4e4e4; 
}

.courseTags {margin-top:5px;}

.img-P {
  max-width:100px; 
  display:block; 
  margin-top:5px;
}

.add-btn{
  width: 100%;
  background: linear-gradient(135deg, #57d85c, #2ab431);
  color:white;
  border:none;
  padding:18px;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  transition:0.3s;
}

.add-btn:hover{
  transform: translateY(-1px);
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

  .search{
    flex:1; 
    padding:16px; 
    margin-bottom:10px; 
    width:100%;
    font-size: 16px;
    border-radius:8px; 
    border:1px solid #ccc;
  }

.student-card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  gap: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.student-card:hover {
  transform: translateY(-3px);
}
  
  .student-card.inactive-card {
  opacity: 0.55;
  filter: grayscale(0.35);
  border: 2px dashed #999;
  background: #f3f3f3;
}

.student-header {
  display: flex;
  gap: 10px;
  align-items: center;
}

.student-img {
  width: 60px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
  background: #ccc;

  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.student-info {
  flex: 1;
}

.student-actions {
  display: flex;
  gap: 8px;
  z-index: 2;
  margin-top: 10px;
}

.student-actions button {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.edit-btn {
  background-color: #8c7d7b;;
  color: rgb(255, 255, 255);
      border:2px solid #ccc; 
    border-radius:6px;
  padding: 3px 5%;
  cursor: pointer;
}

.edit-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.delete-btn {
  background: #ebe8e8;
  color: rgb(0, 0, 0);
  border:1px solid #ccc; 
  border-radius:6px;
  padding: 3px 5%;
  cursor: pointer;
}

.delete-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.status-buttons button {
  margin: 5px;
  padding: 6px 10px;

}

.active-status {
  border: 2px solid black;

}

.registerStudent-btn{
  background: linear-gradient(1478deg, #57A5D8, #2968B4);
  padding:10px; 
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.registerStudent-btn:hover{
  transform: translateY(-2);
  background-color: #2968B4;
}

.status-btn {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  margin-left: 5px;
  font-size: 12px;
}

.status-btn.active {
  background: #ef4444;
  color: white;
}

.status-btn.inactive {
  background: #22c55e;
  color: white;
}


</style>

</head>

<body onload="checkAuth(); displayUser()">

  <div class="topbar">

  <div class="top-left">

    <img style="height: 40px;" src="Upload/p2f logo.png" alt="Logo">

    <div class="user-name">
      <span id="currentUser"></span>
    </div>
  </div>

  <button class="settings-btn" onclick="window.location.href='settings.html'">
    ⚙️
  </button>

</div>

<div class="navbar" id="navbar">

<button onclick="window.location.href='index.html'">
📊 Dashboard
</button>

<button onclick="window.location.href='students.html'">
📝 Student Registration
</button>
	
<button class="active" onclick="window.location.href='registered-students.html'">
👨‍🎓 Registered Students
</button>
	
<button onclick="window.location.href='attendance.html'">
📋 Attendance
</button>

<button onclick="window.location.href='performance.html'">
⭐ Student Performance
</button>

</div>

<div class="container wide">


<h2>Student Registry</h2>
  
  <input type="text" class="search" id="searchStudent" placeholder="🔍 Search student by name...">

	
	<select id="sortOption" style="padding:10px; border-radius:8px; margin-bottom:10px;">
  <option value="az">A → Z</option>
  <option value="za">Z → A</option>
  <option value="top">Top Performance</option>
</select>
	
	<button class="registerStudent-btn"  onclick="window.location.href='students.html'">
📝 Register Students
</button>
	
<h3>Registered Students</h3>

<div id="studentCards" class="student-grid"></div><br>
</div>  

 <div class="bottom-nav">

  <button class="nav-item"onclick="window.location.href='index.html'">
    <span>🏠</span>
    <small>Home</small>
  </button>

  <button class="nav-item" onclick="window.location.href='students.html'">
    <span>📝</span>
    <small>Students</small>
  </button>

  <button class="nav-item active" onclick="window.location.href='registered-students.html'">
    <span>👨‍🎓</span>
    <small>Registered</small>
  </button>

  <button class="nav-item" onclick="window.location.href='attendance.html'">
    <span>📋</span>
    <small>Attendance</small>
  </button>

  <button class="nav-item" onclick="window.location.href='performance.html'">
    <span>⭐</span>
    <small>Performance</small>
  </button>

</div>

</body>
</html>
