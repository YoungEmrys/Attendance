<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <title>Edit Student</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#667eea">

  <link rel="icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json"> 
  <link rel="stylesheet" href="css/notifications.css">
  <link rel="stylesheet" href="css/style.css">

  <script src="js/core/db.js"></script>
  <script src="/js/core/sync.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/edit-student.js"></script> 
  <script src="js/core/ui.js"></script>
  <script src="js/core/pwa.js"></script>
  <script src="/js/core/data-layer.js"></script>
  <script src="js/attendance.js"></script>
 	
	<style>
.page-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
  color: #222;
  text-align: center;
}

.form-card {
  background: transparent;
  border-radius: 18px;
  padding: 20px;
}

.form-card input,
.form-card textarea,
.form-card select {
  width: 100%;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 15px;
  margin-bottom: 14px;
  box-sizing: border-box;
}

.edit-image {
  width: 140px;
  height: 170px;
  object-fit: cover;
  border-radius: 16px;
  border: 2px solid #eee;
  margin-bottom: 15px;
}

.save-btn:hover,
.cnc-btn:hover {
  transform: translateY(-2px);
}

@media (max-width: 768px) {

  .form-card {
    padding: 16px;
    border-radius: 16px;
  }

  .page-title {
    font-size: 22px;
  }
}

.status-section {
  margin: 16px 0;
}

.status-label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
}

.status-toggle input {
  display: none;
}

.status-slider {
  display: inline-block;
  padding: 10px 18px;
  border-radius: 999px;
  background: #22c55e;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s ease;
  user-select: none;
}

.status-toggle input:not(:checked) + .status-slider {
  background: #ef4444;
}

.status-toggle input:checked + .status-slider::after {
  content: "ACTIVE";
}

.status-toggle input:not(:checked) + .status-slider::after {
  content: "INACTIVE";
}

.status-slider {
  font-size: 14px;
}

.status-slider::after {
  content: "";
}

.image-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 15px;
}

.course-box {
  display: flex;
  gap: 8px;
}

.course-box input {
  flex: 1;
}

.course-box button {
  padding: 10px;
  border: none;
  background: #667eea;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.course-box button:hover {
  background: #5563d6;
}

/* Course tags */
#editCourses {
  margin-top: 10px;
}

#editCourses span {
  display: inline-block;
  margin: 5px;
  padding: 6px 10px;
  background: #667eea;
  color: white;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
}

.save-btn {
  width: 100%;
  padding: 20px;
  margin-top: 15px;
  background: linear-gradient(135deg, #57d85c, #2ab431);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  cursor: pointer;  
  transition: transform 0.2s ease, box-shadow 0.2s ease;


}
	
.cnc-btn {
  width: 100%;
  padding: 20px;
  margin-top: 15px;
  background: linear-gradient(135deg, #57d8ba, #2ab4a4);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  cursor: pointer;  
  transition: 0.2s ease-in-out;

}

	
	</style>
		
</head>

<body onload="checkAuth(); loadEditStudent();">
  <div class="topbar">

  <div class="top-left">

    <img style="height: 40px;" src="Upload/p2f logo.png" alt="Logo">

    <div class="user-name">
      <span id="currentUser"></span>
    </div>
  </div>

  <button class="settings-btn" onclick="window.location.href='settings.html'">
    ⚙️
  </button>

</div>

		<div class="navbar" id="navbar">

  <button onclick="window.location.href='index.html'">
  📊 Dashboard
  </button>

  <button onclick="window.location.href='students.html'">
📝 Student Registration
</button>

  <button
onclick="window.location.href='registered-students.html'">
👨‍🎓 Registered Students
</button>

  <button onclick="window.location.href='attendance.html'">
  📋 Attendance
  </button>

  <button onclick="window.location.href='performance.html'">
  ⭐ Student Performance
  </button>

</div>

	
<div class="container wide">

  <h1 class="page-title">Edit Student</h1>

  <div class="form-card">

    <div id="editStudentForm">
  <div class="image-section">
    <img id="editImagePreview" class="edit-image" src="" alt=""/>
</div>

<div>
    <label style="text-align: left;" class="status-label">Update Student Image</label>
    <input style="background-color: #ffffff; margin: 0;" type="file" id="editImage" accept="image/*" />
</div><br>

  <div>
  <label class="status-label">Student Name</label>
  <input type="text" id="editName" placeholder="Student Name" /> 
</div>

<div>
  <label class="status-label">Student ID</label>
  <input type="number" id="editId" placeholder="Student ID" />
 </div>

<div class="status-section">

  <label class="status-label">Student Status</label>

  <label class="status-toggle">

    <input type="checkbox" id="editActive" checked>
    <span class="status-slider"></span>

  </label>
</div>

  <div class="course-box">
    <input id="editCourseInput" placeholder="Add course" />
    <button id="addCourseBtnEdit">Add</button>
  </div>

  <div id="editCourses"></div>

  <button class="save-btn" onclick="saveEdit()">Save Changes</button>
  <button class="cnc-btn" onclick="goBack()">Cancel</button>

</div>
</div>
</div>	
	
 <div class="bottom-nav">

  </button>

  <button class="nav-item" onclick="window.location.href='students.html'">

  </button>

  <button class="nav-item" onclick="window.location.href='registered-students.html'">

    <small>Registered</small>
  </button>

  <button class="nav-item" onclick="window.location.href='attendance.html'">
    <span>📋</span>
    <small>Attendance</small>
  </button>

  <button class="nav-item" onclick="window.location.href='performance.html'">
    <span>⭐</span>
    <small>Performance</small>
  </button>

</div>

</body>
</html>
