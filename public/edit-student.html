<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <title>Edit Student</title>
  
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/edit-student.js"></script> 
	
	<style>
		.edit-container {
      display: grid;
      gap: 10px;
  max-width: 400px;
  margin: 40px auto;
  padding: 20px;
  background: #ffffff;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  font-family: Arial, sans-serif;
  align-items: right;
}

.edit-container h2 {
  text-align: center;
  margin-bottom: 20px;
}

.edit-container input[type="text"],
.edit-container input[type="file"],
.edit-container input[type="number"],
.edit-container textarea,
.edit-container select {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.status-section {
  margin: 16px 0;
}

.status-label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
}

.status-toggle input {
  display: none;
}

.status-slider {
  display: inline-block;
  padding: 10px 18px;
  border-radius: 999px;
  background: #22c55e;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s ease;
  user-select: none;
}

.status-toggle input:not(:checked) + .status-slider {
  background: #ef4444;
}

.status-toggle input:checked + .status-slider::after {
  content: "ACTIVE";
}

.status-toggle input:not(:checked) + .status-slider::after {
  content: "INACTIVE";
}

.status-slider {
  font-size: 14px;
}

.status-slider::after {
  content: "";
}

.image-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 15px;
}

.edit-image {
  width: 120px;
  height: 150px;
  object-fit: cover;
  border-radius: 12px;
  border: 2px solid #eee;
  margin-bottom: 10px;
}

/* Course input */
.course-box {
  display: flex;
  gap: 8px;
}

.course-box input {
  flex: 1;
}

.course-box button {
  padding: 10px;
  border: none;
  background: #667eea;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.course-box button:hover {
  background: #5563d6;
}

/* Course tags */
#editCourses {
  margin-top: 10px;
}

#editCourses span {
  display: inline-block;
  margin: 5px;
  padding: 6px 10px;
  background: #667eea;
  color: white;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
}

.save-btn {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: linear-gradient(135deg, #57d85c, #2ab431);
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 15px;
  cursor: pointer;  
  transition: 0.2s ease-in;

}

.save-btn:hover {
  transform: translateY(-3px);
}
	
.cnc-btn {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: linear-gradient(135deg, #57d8ba, #2ab4a4);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;  
  transition: 0.2s ease-in-out;

}

.cnc-btn:hover {
  transform: translateY(-3px);
  
}	

	
	</style>
		
</head>

<body onload="checkAuth(); loadEditStudent();">

	
<div class="edit-container">

  <h2>Edit Student</h2>

  <div id="editStudentForm">
  <div class="image-section">
    <img id="editImagePreview" class="edit-image" src="" alt=""/>
    <input type="file" id="editImage" accept="image/*" />
  </div>

  <div>
  <input type="text" id="editName" placeholder="Student Name" /> 
</div>

<div>
  <input type="number" id="editId" placeholder="Student ID" />
 </div>

<div class="status-section">

  <label class="status-label">Student Status</label>

  <label class="status-toggle">

    <input type="checkbox" id="editActive" checked>
    <span class="status-slider"></span>

  </label>
</div>
<br><br>

  <div class="course-box">
    <input id="editCourseInput" placeholder="Add course" />
    <button id="addCourseBtnEdit">Add</button>
  </div>

  <div id="editCourses"></div>

  <button class="save-btn" onclick="saveEdit()">Save Changes</button>
  <button class="cnc-btn" onclick="goBack()">Cancel</button>

</div>
</div>	
	
<script src="js/attendance.js"></script>

</body>
</html>
