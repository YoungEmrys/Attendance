   <style>
    h3 { margin-top: 20px; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #f0f0f0;
    }

    .highlight {
      margin-top: 20px;
      padding: 15px;
      border: 2px solid gold;
      background: #fff8dc;
      border-radius: 8px;
    }
	  
.logo{
  float: left;
  border: none;
  padding: 0;
  font-family: Arial, Helvetica, sans-serif;
  font-weight: 500;
  cursor: pointer;
}

#settingsCards {
  display: grid;
  gap: 18px;
}

.card {
  width: 100%;
  background: #ffffff;
  border: 1px solid #eee;
  border-radius: 14px;
  padding: 18px 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
  overflow-x: auto;
}

.card button{
  transition: 0.3s ease-in-out;
  border: none;
  background-color: #8195ed;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s ease-in-out;
  color: white;
}

.card button:hover{
  transform: translateY(-2px);
  box-shadow: 0 10px 10px -4px rgba(0,0,0,0.3);
}

.card h3 {
  margin-top: 0;
  margin-bottom: 15px;
  font-size: 18px;
  color: #333;
}

</style>
