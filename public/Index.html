<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
  <title>Attendance Dashboard</title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
	<script src="js/auth.js"></script>	
	<script src="js/storage.js"></script>	

   <style>
        body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 3% 5%;
    }

.container {
  max-width: 1100px;
  margin: auto;
  background: rgba(255,255,255,0.9);
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

    h2 { margin-top: 20px; }

    input, button {
      padding: 6px;
      margin: 5px 0;
    }

    button {
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }


    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #f0f0f0;
    }

    .highlight {
      margin-top: 20px;
      padding: 15px;
      border: 2px solid gold;
      background: #fff8dc;
      border-radius: 8px;
    }
	  
.navbar{
  width:94%;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:14px;

  padding:1.5% 3%;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  border-radius:20px;
  border:1px solid rgba(255,255,255,0.4);

  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}
/* NAV BUTTONS */

.navbar button{

  padding:10px 20px;
  border:none;
  border-radius:25px;

  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(5px);

  color:#333;
  font-weight:bold;
  font-size:14px;

  cursor:pointer;

  transition:all 0.3s ease;

  box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

.navbar button:hover{
  background:#667eea;
  color:white;

  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* ACTIVE PAGE */

.navbar button.active{
  background:#667eea;
  color:white;
}

.menu-toggle{
  display:block;
  font-size:20px;
  padding:8px 14px;
  border-radius:10px;
  background:rgba(255, 255, 255, 0.6);
  border:none;
  cursor:pointer;
  margin-bottom:10px;
  color: #667eea;
}


/* MOBILE */

@media(max-width:700px){

  .navbar{
    flex-direction:column;
    align-items:flex-start;   /* aligns menu to left */
    display:none;
    width:94%;  }

  .navbar.show{
    display:flex;
  }

  .navbar button{
    width:100%;
    text-align:left;         /* text aligns left */
  }

}

.logo{
	height: 50px;
	width: 60px;
  float: left;
	/*background: black;*/
	z-index: 1;
  align-items: center;
  justify-content: center;
  display: flex;
  font-family: Arial, Helvetica, sans-serif;
  font-weight: 500;
  cursor: pointer;
}

.tm{
  display: flex;
  float: right;

}
   </style> 
	
</head>

<body onload="checkAuth(); displayUser();">

<div class="container">

  <div class="logo">
    <a href="index.html"><img src="Upload/p2f logo.png" height="50" alt="Company Logo"/></a>
  </div>
  
<div class="logo">
    <div class="user-profile"><span id="currentUser"></span></div>
</div>

<div class="tm">
  <button class="menu-toggle" onclick="toggleMenu()">☰</button>
</div>
<br><br><br><br>

<!-- Navigation-->
  		<div class="navbar" id="navbar">

  <button class="active" window.location.href='index.html'">
  📊 Dashboard
  </button>

  <button onclick="window.location.href='students.html'">
👨‍🎓 Students
</button>

  <button onclick="window.location.href='performance.html'">
  ⭐ Student Performance
  </button>
			
  <button onclick="window.location.href='attendance.html'">
  📋 Attendance
  </button>

    <button onclick="window.location.href='users.html'"> User Management
  </button>

  <button onclick="logout()">Logout</button>

</div>

<!-- Attendance Report-->
	
  <h1>Monthly Attendance Dashboard</h1> 


  <h2>Select Month</h2>
  <input type="month" id="monthPicker" onchange="renderDashboard()">
	
<div id="monthlyTotal" style="margin-top:10px; font-weight:bold;"></div>

  <div id="topStudent"></div>

  <h2>Monthly Summary</h2>
  <div id="summaryTable"></div>

   <input type="date" id="datePicker">
	<button onclick="exportMonthlyReport()">Save Report</button>

	<h3>Data Backup</h3>

<button onclick="backupData()">Backup Data</button>

  <input type="file" id="importFile" accept=".json" onchange="importBackup(event)">

</div>

	<script src="js/dashboard.js"></script>
	
	

</body>
</html>
