   <style>
        body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 3% 3%;
    }

.container {
  max-width: 1130px;
  margin: auto;
  background: rgba(255,255,255,0.9);
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

    h2 { margin-top: 20px; }

    input, button {
      padding: 6px;
      margin: 5px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #f0f0f0;
    }

    .highlight {
      margin-top: 20px;
      padding: 15px;
      border: 2px solid gold;
      background: #fff8dc;
      border-radius: 8px;
    }
	  
.navbar{
  width:94%;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:5px;
  padding:1.5% 3%;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur (12px);
  -webkit-backdrop-filter:blur(12px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.4);
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.navbar button{

  padding:10px 20px;
  border:none;
  border-radius:25px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(5px);
  color:#333;
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
  transition:all 0.3s ease;
  box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

.navbar button:hover{
  background:#667eea;
  color:white;

  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

.navbar button.active{
  background:#667eea;
  color:white;
}

/* MOBILE */

@media(max-width:700px){

  .navbar{
    flex-direction:column;
    align-items:flex-start;   /* aligns menu to left */
    display:none;
    width:94%;  }

  .navbar.show{
    display:flex;
  }

  .navbar button{
    width:100%;
    text-align:left;         /* text aligns left */
  }

}

.logo{
	height: 50px;
	width: 60px;
  float: left;
	/*background: black;*/
	z-index: 1;
  align-items: center;
  justify-content: center;
  display: flex;
  font-family: Arial, Helvetica, sans-serif;
  font-weight: 500;
  cursor: pointer;
}


.tm button{
  float: right;
  background-color:rgb(255, 255, 255);
  color: #5f7af0; 
  margin: 10px 5px 0 5px;
  padding:6px 12px;
  border:none;
  border-radius:8px;
  backdrop-filter:blur(5px);
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  transition:all 0.2s ease-in-out;
}

.tm button:hover{
  transform: translateY(-2px);
  box-shadow: 0 7px 25px -4px rgba(0,0,0,0.2);
}

.logt{ 
  color: #f0f0f0;    
  background:#667eea;
}

.settings {
  float: right; 
  background-color: transparent; 
  font-size: 20px;
  cursor: pointer;
  transition: all 0.3s;
  border: none;
  border-radius: 50px;
  text-align: center;
  transition:all 0.3s ease-in-out;
}

.settings:hover{
  transform: translateY(-2px);
  box-shadow: 0 10px 10px -4px rgba(0,0,0,0.3);
  background-color: #f0f0f0;
}

/* GRID WRAPPER */
#settingsCards {
  display: grid;
  gap: 18px;
}

.card {
  background: #ffffff;
  border: 1px solid #eee;
  border-radius: 14px;
  padding: 18px 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

.card button{
  transition: 0.3s ease-in-out;
  border: none;
  background-color: #8195ed;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s ease-in-out;
  color: white;


}

.card button:hover{
  transform: translateY(-2px);
  box-shadow: 0 10px 10px -4px rgba(0,0,0,0.3);
}

.card h2 {
  margin-top: 0;
  margin-bottom: 15px;
  font-size: 18px;
  color: #333;
}
