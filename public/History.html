<!DOCTYPE html>
<html>
<head>
  <title>Practical History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 0;
    }

    .container {
      width: 95%;
      max-width: 1100px;
      margin: 40px auto;
      padding: 30px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      color: white;
      margin-right: 5px;
      margin-bottom: 10px;
    }

    .back-btn { background: #03A9F4; }
    .clear-btn { background: #d32f2f; }
    .delete-btn { background: #f44336; }
    .export-btn { background: #4CAF50; }
    .import-btn { background: #FF9800; }

    .filters {
      margin: 15px 0;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    select {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px;
      font-size: 13px;
      text-align: center;
      word-wrap: break-word;
      white-space: normal;
    }

    th { background: #f0f0f0; }

    .empty {
      text-align: center;
      font-size: 18px;
      padding: 20px;
    }

    .progress-container {
      background: #eee;
      border-radius: 6px;
      overflow: hidden;
      height: 10px;
      margin-top: 5px;
    }

    .progress-bar {
      height: 10px;
      background: #4CAF50;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Saved Practical History</h1>

  <button class="back-btn" onclick="goBack()">Back to Tracker</button>
  <button class="export-btn" onclick="exportHistory()">Export Backup</button>
  <button class="import-btn" onclick="document.getElementById('importFile').click()">Import Backup</button>
  <button class="clear-btn" onclick="clearHistory()">Clear All</button>

  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importHistory(event)">

  <!-- FILTER SECTION -->
  <div class="filters">
    <div>
      <label>Student:</label><br>
      <select id="studentFilter" onchange="updateCourseFilter(); applyFilters();">
        <option value="all">All Students</option>
      </select>
    </div>

    <div>
      <label>Course:</label><br>
      <select id="courseFilter" onchange="applyFilters();">
        <option value="all">All Courses</option>
      </select>
    </div>
  </div>

  <div id="historyContainer"></div>
</div>

<script src="app.js"></script>

<script>

  function populateStudentFilter(history) {
    const studentSelect = document.getElementById("studentFilter");
    const students = [...new Set(history.map(h => h.studentName))];

    students.forEach(student => {
      const option = document.createElement("option");
      option.value = student;
      option.textContent = student;
      studentSelect.appendChild(option);
    });
  }

  function updateCourseFilter() {
    const history = getHistory();
    const selectedStudent = document.getElementById("studentFilter").value;
    const courseSelect = document.getElementById("courseFilter");

    courseSelect.innerHTML = `<option value="all">All Courses</option>`;

    let filtered = history;

    if (selectedStudent !== "all") {
      filtered = history.filter(h => h.studentName === selectedStudent);
    }

    const courses = [...new Set(filtered.map(h => h.course))];

    courses.forEach(course => {
      const option = document.createElement("option");
      option.value = course;
      option.textContent = course;
      courseSelect.appendChild(option);
    });
  }

  function applyFilters() {
    const history = getHistory();
    const studentValue = document.getElementById("studentFilter").value;
    const courseValue = document.getElementById("courseFilter").value;

    let filtered = history;

    if (studentValue !== "all") {
      filtered = filtered.filter(h => h.studentName === studentValue);
    }

    if (courseValue !== "all") {
      filtered = filtered.filter(h => h.course === courseValue);
    }

    renderTable(filtered);
  }

  function renderTable(data) {
    const container = document.getElementById('historyContainer');

    if (data.length === 0) {
      container.innerHTML = "<div class='empty'>No records found.</div>";
      return;
    }

    let tableHTML = `
      <table>
        <tr>
          <th>Student</th>
          <th>Course</th>
          <th>Month</th>
          <th>Required</th>
          <th>Done</th>
          <th>Completion</th>
          <th>Action</th>
        </tr>
    `;

    data.forEach((entry) => {

      const percent = entry.totalRequired > 0
        ? ((entry.donePracs / entry.totalRequired) * 100).toFixed(1)
        : 0;

      tableHTML += `
        <tr>
          <td>${entry.studentName}</td>
          <td>${entry.course}</td>
          <td>${months[entry.month]} ${entry.year}</td>
          <td>${entry.totalRequired}</td>
          <td>${entry.donePracs}</td>
          <td>
            ${percent}%
            <div class="progress-container">
              <div class="progress-bar" style="width:${percent}%"></div>
            </div>
          </td>
          <td>
            <button class="delete-btn" onclick="deleteByIdentity('${entry.studentName}','${entry.course}',${entry.month},${entry.year})">
              Delete
            </button>
          </td>
        </tr>
      `;
    });

    tableHTML += "</table>";
    container.innerHTML = tableHTML;
  }

  function deleteByIdentity(student, course, month, year) {
    let history = getHistory();

    history = history.filter(h =>
      !(h.studentName === student &&
        h.course === course &&
        h.month === month &&
        h.year === year)
    );

    saveHistory(history);
    applyFilters();
  }

  function clearHistory() {
    if (confirm("Delete all history?")) {
      localStorage.removeItem("history");
      location.reload();
    }
  }

  function exportHistory() {
    const history = getHistory();
    const dataStr = JSON.stringify(history, null, 2);
    const blob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "practical_backup.json";
    a.click();

    URL.revokeObjectURL(url);
  }

  function importHistory(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const importedData = JSON.parse(e.target.result);
        if (!Array.isArray(importedData)) {
          alert("Invalid backup file.");
          return;
        }

        const choice = confirm(
          "Press OK to REPLACE all current data.\n\nPress Cancel to MERGE with existing data."
        );

        let currentHistory = getHistory();

        if (choice) {
          saveHistory(importedData);
        } else {
          const merged = [...currentHistory];

          importedData.forEach(newEntry => {
            const exists = merged.some(existing =>
              existing.studentName === newEntry.studentName &&
              existing.course === newEntry.course &&
              existing.month === newEntry.month &&
              existing.year === newEntry.year
            );

            if (!exists) merged.push(newEntry);
          });

          saveHistory(merged);
        }

        location.reload();

      } catch {
        alert("Invalid JSON file.");
      }
    };

    reader.readAsText(file);
  }

  function goBack() {
    window.location.href = "index.html";
  }

  // INITIAL LOAD
  const fullHistory = getHistory();
  populateStudentFilter(fullHistory);
  updateCourseFilter();
  renderTable(fullHistory);

</script>

</body>
</html>
