<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Registry</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="js/auth.js"></script>

<style>

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 3% 5%;
    }

.container {
  max-width: 1100px;
  margin: auto;
  background: rgba(255,255,255,0.9);
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

/* STUDENT LIST */

.student-card{
  display:flex;
  justify-content:space-between;
  align-items:center;

  background:#f7f7f7;
  padding:10px 15px;
  margin-top:8px;

  border-radius:8px;
}

.delete-btn{
  background:#de0909;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

.add-btn{
  width: 100%;
  background:#0bc931;
  color:white;
  border:none;
  padding:20px 0;
  border-radius:6px;
  cursor:pointer;
  color: #ffffff;
  font-size: 16px;
  font-weight: bold;
}

.add-btn:hover{
  background:#01b324;

}

input, button {
      padding: 6px;
      margin: 0.7% 0.5%;
    }

.navbar{
  width:94%;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:14px;

  padding:1.5% 3%;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  border-radius:20px;
  border:1px solid rgba(255,255,255,0.4);

  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}
/* NAV BUTTONS */

.navbar button{

  padding:10px 20px;
  border:none;
  border-radius:25px;

  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(5px);

  color:#333;
  font-weight:bold;
  font-size:14px;

  cursor:pointer;

  transition:all 0.3s ease;

  box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

.navbar button:hover{
  background:#667eea;
  color:white;

  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

.logt{
  padding:7px 12px;
  margin: 0 5px;
  border:none;
  border-radius:12px;
  background:#667eea;
  backdrop-filter:blur(5px);
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
    color:white;

}

.logt:hover{
  background:#2f50e4;
}

/* ACTIVE PAGE */

.navbar button.active{
  background:#667eea;
  color:white;
}

/* MOBILE MENU */

.menu-toggle{
  display:block;
  font-size:20px;
  padding:8px 14px;
  border-radius:10px;
  background:rgba(255, 255, 255, 0.6);
  border:none;
  cursor:pointer;
  margin-bottom:10px;
  color: #667eea;
}

/* MOBILE */

@media(max-width:700px){

  .navbar{
    flex-direction:column;
    align-items:flex-start;   /* aligns menu to left */
    display:none;
    width:94%;  }

  .navbar.show{
    display:flex;
  }

  .navbar button{
    width:100%;
    text-align:left;         /* text aligns left */
  }

  .menu-toggle{
    display:block;
    margin-bottom:10px;
  }

}

#imagePreview { 
  margin-top:10px; 
  max-width:150px; 
  border-radius:8px; 
}

.student-Crs {display:flex; 
  gap:5px; 
  align-items:center;
}

.courseTags {margin-top:5px;}

.img-P {
  max-width:100px; 
  display:block; 
  margin-top:5px;
}
	.header{
		height: auto;
		display: flex;
		align-items: center;
	  }

  .register{
    height:50px; 
    width:96%;
    font-size: 16px;
    border-radius:8px; 
    border:1px solid #ccc;

  }

</style>

</head>

<body onload="checkAuth()">

<div class="container">
	
	<div class = "header">
<button class="menu-toggle" onclick="toggleMenu()">☰</button>
	<div id="userProfile" style="margin-left:auto; font-weight:bold; float: right">
	

  </div>
  <button onclick="logout()" class="logt">Logout</button>
	</div>


<div class="navbar" id="navbar">

<button onclick="window.location.href='index.html'">
📊 Dashboard
</button>

<button class="active" onclick="window.location.href='students.html'">
👨‍🎓 Student Registration
</button>

<button onclick="window.location.href='attendance.html'">
📋 Attendance
</button>

<button onclick="window.location.href='performance.html'">
⭐ Student Performance
</button>

</div>

<h1>Student Registry</h1>
  
  <input type="text" class="register" id="searchStudent" placeholder="🔍 Search student by name..."
  style="padding:10px; margin-bottom:10px; height:30px">
	
<h3>Add Student</h3>

<div id="studentForm">

<label for="studentName"> Student Name</label><br>
<input type="text" class="register" id="studentName" placeholder="Enter Student Name"><br><br>

<label for="studentId">Student ID </label><br>
<input type="text" class="register" id="studentId" placeholder="Enter Student ID"><br><br>

<label for="studentCourseInput">Student Course</label><br>

<div class="student-Crs" style="display:flex; gap:5px; align-items:center;">
  <input type="text" class="register" id="studentCourseInput" placeholder="Enter course">
  <button type="button" id="addCourseBtn">+</button>
</div>  
<div class="course-tag" id="courseTags"></div><br>

<label for="studentImage">Student Image</label><br>
<input type="file" id="studentImage" accept="image/*"><br>
<img class="img-P" id="imagePreview" style="max-width:100px; display:block; margin-top:5px;"/><br>

<button class="add-btn" type="button" id="addStudentBtn"> Add Student</button>
</div>

<h3>Registered Students</h3>

<div id="studentList"></div><br>
</div>  


<script src="js/storage.js"></script>
<script src="js/attendance.js"></script>

</body>
</html>
