<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Registry</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#667eea">

<link rel="icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">      
<link rel="stylesheet" href="css/notifications.css">
<link rel="stylesheet" href="css/modal.css">

<script src="js/core/settings.js"></script>  
<script src="js/core/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/students.js"></script>
<script src="js/edit-student.js"></script>
<script src="js/core/ui.js"></script>
<script src="js/core/pwa.js"></script>
<script src="/js/core/data-layer.js"></script>
<script src="js/attendance.js"></script>
<script src="js/core/dom-init.js"></script>

<style>

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 3% 5%;
    }

.container {
  max-width: 1100px;
  margin: auto;
  background: rgba(255,255,255,0.9);
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

input, button {
      padding: 6px;
      margin: 0.7% 0.5%;
    }

.navbar{
  width:94%;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:14px;

  padding:1.5% 3%;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  border-radius:20px;
  border:1px solid rgba(255,255,255,0.4);

  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}
/* NAV BUTTONS */

.navbar button{

  padding:10px 20px;
  border:none;
  border-radius:25px;

  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(5px);

  color:#333;
  font-weight:bold;
  font-size:14px;

  cursor:pointer;

  transition:all 0.3s ease;

  box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

.navbar button:hover{
  background:#667eea;
  color:white;

  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

.logt{
  padding:7px 12px;
  margin: 0 5px;
  border:none;
  border-radius:12px;
  background:#667eea;
  backdrop-filter:blur(5px);
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
    color:white;

}

.logt:hover{
  background:#2f50e4;
}

/* ACTIVE PAGE */

.navbar button.active{
  background:#667eea;
  color:white;
}

@media(max-width:700px){

  .navbar{
    flex-direction:column;
    align-items:flex-start;   /* aligns menu to left */
    display:none;
    width:94%;  }

  .navbar.show{
    display:flex;
  }

  .navbar button{
    width:100%;
    text-align:left;         /* text aligns left */
  }

  .menu-toggle{
    display:block;
    margin-bottom:10px;
  }

}

#imagePreview { 
  margin-top:10px; 
  max-width:150px; 
  border-radius:8px; 
}

.student-Crs {display:flex; 
  gap:5px; 
  align-items:center;
}

.plus{
   background-color: #ffffff; 
   border:1px solid #ccc; 
  border-radius:6px;
  padding: 20px 8px;
  cursor: pointer;

}

.plus:hover{
     background-color: #e4e4e4; 

}

.courseTags {margin-top:5px;}

.img-P {
  max-width:100px; 
  display:block; 
  margin-top:5px;
}

.add-btn{
  width: 100%;
  background: linear-gradient(135deg, #57d85c, #2ab431);
  color:white;
  border:none;
  padding:18px;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  transition:0.3s;
}

.add-btn:hover{
  transform: translateY(-1px);
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}


	.header{
		height: auto;
		display: flex;
		align-items: center;
	  }

  .register{
    height:50px; 
    width:96%;
    font-size: 16px;
    border-radius:8px; 
    border:1px solid #ccc;

  }

  .file{
    width: 90%; 
    cursor: pointer; 
    background-color: #ffffff;
    padding:20px; 
    border:1px solid #ccc; 
    border-radius:6px;
  }

  .file:hover{
        background-color: #e4e4e4; 

  }

  /* ======================
   STUDENT GRID
====================== */

.student-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
}

@media (min-width: 600px) {
  .student-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1000px) {
  .student-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* ======================
   STUDENT CARD
====================== */

.student-card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  gap: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.student-card:hover {
  transform: translateY(-3px);
}

.student-header {
  display: flex;
  gap: 10px;
  align-items: center;
}

.student-img {
  width: 60px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
  background: #ccc;

  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.student-info {
  flex: 1;
}

.student-actions {
  display: flex;
  gap: 8px;
  z-index: 2;
  margin-top: 10px;
}

.student-actions button {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.edit-btn {
  background-color: #8c7d7b;;
  color: rgb(255, 255, 255);
      border:2px solid #ccc; 
    border-radius:6px;
  padding: 3px 5%;
  cursor: pointer;
}

.edit-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.delete-btn {
  background: #ebe8e8;
  color: rgb(0, 0, 0);
  border:1px solid #ccc; 
  border-radius:6px;
  padding: 3px 5%;
  cursor: pointer;


}

.delete-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.status-buttons button {
  margin: 5px;
  padding: 6px 10px;

}

.active-status {
  border: 2px solid black;

}



/* ======================
   FORM GRID
====================== */

.form-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
}

/* Desktop */
@media (min-width: 768px) {
  .form-grid.two {
    grid-template-columns: 1fr 1fr;
  }
}

   .tm button{
  float: right;
  background-color:rgb(255, 255, 255);
  color: #5f7af0; 
  padding:6px 12px;
  margin: 10px 0 0 8px;
  border:none;
  border-radius:8px;
  backdrop-filter:blur(5px);
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  transition:all 0.2s ease;
}

.tm button:hover{
  transform: translateY(-3px);
  background-color:rgb(255, 255, 255);
}


.settings {
  float: right; 
  background-color: transparent; 
  font-size: 20px;
  border: none;
}


</style>

</head>

<body onload="checkAuth()">

<div class="container">

	<button class="settings" onclick="window.location.href = 'settings.html'">⚙️</button>

    <div class="tm">
    <button class="logt" onclick="logout()">Logout</button>
<button style="float: left;" onclick="toggleMenu()">☰</button>
	<div id="userProfile" style="float: right; margin-top: 14px;font-weight: bold;" ></div>
</div><br><br><br>

<div class="navbar" id="navbar">

<button onclick="window.location.href='index.html'">
📊 Dashboard
</button>

<button class="active" onclick="window.location.href='students.html'">
📝 Student Registration
</button>
	
<button
onclick="window.location.href='registered-students.html'">
👨‍🎓 Registered Students
</button>


<button onclick="window.location.href='attendance.html'">
📋 Attendance
</button>

<button onclick="window.location.href='performance.html'">
⭐ Student Performance
</button>

</div>

<h1>Student Registry</h1>
  
  <input type="text" class="register" id="searchStudent" placeholder="🔍 Search student by name..."
  style="padding:10px; margin-bottom:10px; height:30px">
	
	<select id="sortOption" style="padding:10px; border-radius:8px; margin-bottom:10px;">
  <option value="az">A → Z</option>
  <option value="za">Z → A</option>
  <option value="top">Top Performance</option>
</select>
	
<h3>Add Student</h3>

<div id="studentForm">

<div class="form-grid two">

  <div>
    <label>Student Name</label><br>
    <input type="text" class="register" id="studentName" placeholder="Enter Student Name">
  </div>

  <div>
    <label>Student ID</label><br>
    <input type="number" class="register" id="studentId" placeholder="Enter Student ID">
  </div>

</div><br>

<div class="form-grid two">

  <div>
    <label>Student Course</label><br>
    <div class="student-Crs">
      <input type="text" class="register" id="studentCourseInput" placeholder="Enter course">
      <button type="button" id="addCourseBtn" class="plus">➕</button>
    </div>
    <div class="courseTags" id="courseTags"></div>
  </div>

  <div>
    <label>Student Image</label><br>
    <input type="file" id="studentImage" accept="image/*" class="file">
    <img class="img-P" id="imagePreview" alt="">
  </div>
  </div><br>

<div class="form-grid two">
<button class="add-btn" type="button" id="addStudentBtn"> Add Student</button>
	
<button class="add-btn" style="  background: linear-gradient(135deg, #57A5D8, #2968B4); " onclick="window.location.href='registered-students.html'"> Registered Students </button>
</div>
	
</div>
</div>
	

</body>
</html>
