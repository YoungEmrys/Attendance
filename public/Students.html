<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Registry</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#667eea">

<link rel="icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">      
<link rel="stylesheet" href="css/notifications.css">
<link rel="stylesheet" href="css/modal.css">
<link rel="stylesheet" href="css/style.css">

<script src="js/core/settings.js"></script>  
<script src="js/core/utils.js"></script>
<script src="/js/core/db.js"></script>
<script src="/js/core/sync.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/students.js"></script>
<script src="js/edit-student.js"></script>
<script src="js/core/ui.js"></script>
<script src="js/core/pwa.js"></script>
<script src="/js/core/data-layer.js"></script>
<script src="js/attendance.js"></script>
<script src="js/core/dom-init.js"></script>

<style>

#imagePreview { 
  margin-top:10px; 
  max-width:150px; 
  border-radius:8px; 
}

.student-Crs {display:flex; 
  gap:5px; 
  align-items:center;
}

.plus{
   background-color: #ffffff; 
   border:1px solid #ccc; 
  border-radius:6px;
  padding: 20px 8px;
  cursor: pointer;

}

.plus:hover{
     background-color: #e4e4e4; 

}

.courseTags {margin-top:5px;}

.img-P {
  max-width:100px; 
  display:block; 
  margin-top:5px;
}

.add-btn{
  width: 100%;
  background: linear-gradient(135deg, #57d85c, #2ab431);
  color:white;
  border:none;
  padding:18px;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  transition:0.3s;
}

.add-btn:hover{
  transform: translateY(-1px);
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.register{
    padding: 20px;    
    width:100%;
    font-size: 16px;
    border-radius:8px; 
    border:1px solid #ccc;
  }
  
.file{
    width: 100%; 
    cursor: pointer; 
    background-color: #ffffff;
    padding:20px; 
    border:1px solid #ccc; 
    border-radius:6px;  
  }

  .file:hover{
        background-color: #e4e4e4; 

  }  
  
  
.form-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
}

/* Desktop */
@media (min-width: 768px) {
  .form-grid.two {
    grid-template-columns: 1fr 1fr;
  }
}

</style>

</head>

<body onload="checkAuth(); displayUser();">

  <div class="topbar">

  <div class="top-left">

    <img style="height: 40px;" src="Upload/p2f logo.png" alt="Logo">

    <div class="user-name">
      <span id="currentUser"></span>
    </div>
  </div>

  <button class="settings-btn" onclick="window.location.href='settings.html'">
    ⚙️
  </button>

</div>

<div class="navbar" id="navbar">

<button onclick="window.location.href='index.html'">
📊 Dashboard
</button>

<button class="active" onclick="window.location.href='students.html'">
📝 Student Registration
</button>
	
<button
onclick="window.location.href='registered-students.html'">
👨‍🎓 Registered Students
</button>


<button onclick="window.location.href='attendance.html'">
📋 Attendance
</button>

<button onclick="window.location.href='performance.html'">
⭐ Student Performance
</button>

</div>

<div class="container wide">

<h2>Student Registry</h2>
	
<h3>Add Student</h3>

<div id="studentForm">

<div class="form-grid two">

  <div>
    <label>Student Name</label><br>
    <input type="text" class="register" id="studentName" placeholder="Enter Student Name">
  </div>

  <div>
    <label>Student ID</label><br>
    <input type="number" class="register" id="studentId" placeholder="Enter Student ID">
  </div>

</div><br>

<div class="form-grid two">

  <div>
    <label>Student Course</label><br>
    <div class="student-Crs">
      <input type="text" class="register" id="studentCourseInput" placeholder="Enter course">
      <button type="button" id="addCourseBtn" class="plus">➕</button>
    </div>
    <div class="courseTags" id="courseTags"></div>
  </div>

  <div>
    <label>Student Image</label><br>
    <input type="file" id="studentImage" accept="image/*" class="file">
    <img class="img-P" id="imagePreview" alt="">
  </div>
  </div><br>

<div class="form-grid two">
<button class="add-btn" type="button" id="addStudentBtn"> Add Student</button>
	
<button class="add-btn" style="  background: linear-gradient(135deg, #57A5D8, #2968B4); " onclick="window.location.href='registered-students.html'"> Registered Students </button>
</div>
	
</div>

</div>
 <div class="bottom-nav">

  <button class="nav-item"onclick="window.location.href='index.html'">
    <span>🏠</span>
    <small>Home</small>
  </button>

  <button class="nav-item active" onclick="window.location.href='students.html'">
    <span>📝</span>
    <small>Students</small>
  </button>

  <button class="nav-item" onclick="window.location.href='registered-students.html'">
    <span>👨‍🎓</span>
    <small>Registered</small>
  </button>

  <button class="nav-item" onclick="window.location.href='attendance.html'">
    <span>📋</span>
    <small>Attendance</small>
  </button>

  <button class="nav-item" onclick="window.location.href='performance.html'">
    <span>⭐</span>
    <small>Performance</small>
  </button>

</div>
	

</body>
</html>
