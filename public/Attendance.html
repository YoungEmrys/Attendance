/* =========================

========================= */

.container {
  max-width: 1100px;

}

/* GRID LAYOUT */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;

@media (min-width: 768px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .grid {
    grid-template-columns: repeat(3, 1fr);

/* CARD */
.card {

  border-radius: 14px;

}

}

.status-buttons {

  gap: 8px;
}

  padding: 10px;

  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.btn-ontime { background: #4CAF50; }
.btn-late { background: #ff9800; }

.time-display.ontime {

.time-display.late {

}

.time-display.absent {

}
