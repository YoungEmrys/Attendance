<!DOCTYPE html>
<html>
<head>
		<meta charset="UTF-8">
  <title>Attendance & Punctuality Tracker</title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

	<script src="js/auth.js"></script>	

		
  <style>
   body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 20px;
    }

.container {
  max-width: 1100px;
  margin: auto;
  background: rgba(255,255,255,0.9);
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

    h2 { margin-top: 30px; }

    input, select, button {
      padding: 6px;
      margin: 5px 0;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th { background: #f0f0f0; }

    .record-box {
      margin-top: 10px;
      padding: 10px;
      background: #f7f7f7;
      border-radius: 8px;
    }

    .locked {
      color: red;
      font-weight: bold;
    } 
	  
	  .export-btn { background: #ff9800; }
	  
    input, button {
      padding: 6px;
      margin: 0.7% 0.5%;
    }

	  
.navbar{
  width:94%;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:14px;

  padding:1.5% 3%;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  border-radius:20px;
  border:1px solid rgba(255,255,255,0.4);

  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}
/* NAV BUTTONS */

.navbar button{

  padding:10px 20px;
  border:none;
  border-radius:25px;

  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(5px);

  color:#333;
  font-weight:bold;
  font-size:14px;

  cursor:pointer;

  transition:all 0.3s ease;

  box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

.navbar button:hover{
  background:#667eea;
  color:white;

  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* ACTIVE PAGE */

.navbar button.active{
  background:#667eea;
  color:white;
}

/* MOBILE MENU */

.menu-toggle{
  display:block;
  font-size:20px;
  padding:8px 14px;
  border-radius:10px;
  background:rgba(255, 255, 255, 0.6);
  border:none;
  cursor:pointer;
  margin-bottom:10px;
  color: #667eea;
}

/* MOBILE */

@media(max-width:700px){

  .navbar{
    flex-direction:column;
    align-items:flex-start;   /* aligns menu to left */
    display:none;
    width:94%;  }

  .navbar.show{
    display:flex;
  }

  .navbar button{
    width:100%;
    text-align:left;         /* text aligns left */
  }
}


    .add-btn { background: #4CAF50; }

    .save-btn {
      display: grid;
      gap: 10px;
      justify-content: flex-start;
      margin-bottom: 15px; 
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); /* 2 per row if space*/

   
      
    }

    .save-btn button{
      background: #667eea;
      width: 100%;
  padding: 10px 15px;
  font-size: 1rem;
  border: none;
  border-radius: 5px;
  color: white;
  cursor: pointer;
  transition: background-color 0.2s, transform 0.1s;
    }

    .save-btn button:hover {
      background-color: #2d46b5;
      transform: translateY(-1px);
    
    }


.clearAllBtn {
  display: grid;
      gap: 10px;
      justify-content: flex-start;
      margin-bottom: 15px; 
      grid-template-columns: repeat(2, minmax(180px, 1fr)); /* 2 per row if space*/
  
}

.clearAllBtn button {
  background: #ed521f;
  width: 100%;
  padding: 10px 15px;
  font-size: 1rem;
  border: none;
  border-radius: 5px;
  color: white;
  cursor: pointer;
  transition: background-color 0.2s, transform 0.1s;
}

.clearAllBtn button:hover {
  background-color: #a23d1b;  /* Darker blue on hover */
  transform: translateY(-1px);  /*Slight lift effect */
}

    .delete-btn { background: #f44336; }

    .delete-btn:hover {
      background-color: #c8372d;  
      transform: translateY(-1px);  /*Slight lift effect */
}

.xpt-btn {
  width: 100%;
  display: flex;
  flex-wrap: wrap;
      justify-content: flex-start;
      margin-bottom: 15px; 
      grid-template-columns: repeat( minmax(180px, 1fr)); /* 2 per row if space*/

  
}

.xpt-btn button{  
  background: #3cbc40;
  width: 100%;
  padding: 10px 15px;
  font-size: 1rem;
  border: none;
  border-radius: 5px;
  color: white;
  cursor: pointer;
  transition: background-color 0.2s, transform 0.1s;
}

.xpt-btn button:hover {  
    background: #2f9b33;
    transform: translateY(-1px);  /*Slight lift effect */

}
	  
	  .header{
		  height: auto;
		  display: flex;
		  align-items: center;
	  }

    .logt{
  padding:7px 12px;
  margin: 0 5px;
  border:none;
  border-radius:12px;
  background:#667eea;
  backdrop-filter:blur(5px);
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
    color:white;

}

.logt:hover{
  background:#2f50e4;
}



  </style>
</head>

<body onload= "checkAuth();">
	
<div class="container">

	<div class = "header">
<button class="menu-toggle" onclick="toggleMenu()">☰</button>
	<div id="userProfile" style="margin-left:auto; font-weight:bold; float: right">
</div>
	<button onclick="logout()" style="float: right;"  class="logt">Logout</button>

	</div>
    
		<div class="navbar" id="navbar">

  <button onclick="window.location.href='index.html'">
  📊 Dashboard
  </button>

  <button onclick="window.location.href='students.html'">
👨‍🎓 Student Registration
</button>

  <button onclick="window.location.href='student-record'">
📚 Student Information
</button>


  <button onclick="window.location.href='performance.html'">
  ⭐ Student Performance
  </button>
			
  <button class="active" onclick="window.location.href='attendance.html'">
  📋 Attendance
  </button>


</div>

  <h1>Attendance & Punctuality Tracker</h1>
	

  <!-- DATE PICKER -->
  <h2>Attendance Entry</h2>
  <input type="date" id="datePicker" onchange="loadSelectedDate()">
  <span id="lockStatus"></span><br><br>

  <label>
  <input type="checkbox" id="holidayToggle">
  Mark this day as Holiday / No School
</label>

  <div id="attendanceTable"></div><br>

  <div class="save-btn">  
    <button id="markAbsentBtn">Mark Remaining Students Absent</button>  
    
    <button  onclick="submitAttendance()">Save / Update</button>
	</div>

  <div class="clearAllBtn">
    <button  id="clearMonthBtn">Clear Monthly Attendance</button>

    <button id="fullResetBtn">Reset Attendance </button>
    
  </div>    
  
  <div class="xpt-btn">
      <button  onclick="exportMonthlyReport()">Export Monthly Report</button><br>

  </div>

</div>

<script src="js/storage.js"></script>	
<script src="js/attendance.js"></script>
  
</body>
</html>
