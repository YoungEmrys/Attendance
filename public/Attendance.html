<body onload="checkAuth(); displayUser()">

  <div class="topbar">

  <div class="top-left">

    <img style="height: 40px;" src="Upload/p2f logo.png" alt="Logo">

    <div class="user-name">
      <span id="currentUser"></span>
    </div>
  </div>

  <button class="settings-btn" onclick="window.location.href='settings.html'">
    ⚙️
  </button>

</div>

		<div class="navbar" id="navbar">

  <button onclick="window.location.href='index.html'">
  📊 Dashboard
  </button>

  <button onclick="window.location.href='students.html'">
📝 Student Registration
</button>

  <button
onclick="window.location.href='registered-students.html'">
👨‍🎓 Registered Students
</button>

  <button class="active" onclick="window.location.href='attendance.html'">
  📋 Attendance
  </button>

  <button onclick="window.location.href='performance.html'">
  ⭐ Student Performance
  </button>

</div>

<div class="container wide">
    

  <h2>Attendance & Punctuality Tracker</h2>
	

  <!-- DATE PICKER -->
  <h3>Attendance Entry</h3>
  <input type="date" id="datePicker" onchange="onDateChange()">
  <span id="lockStatus"></span><br><br>
	
	<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">

  <input 
    type="text" 
    id="attendanceSearch" 
    placeholder="🔍 Search Student..."
    style="flex:1; padding:10px; border-radius:8px; border:1px solid #ccc;"
  >

  <select id="attendanceSort" style="padding:10px; border-radius:8px;">
    <option value="az">A → Z</option>
    <option value="za">Z → A</option>
  </select>

</div><br>

<details class="import-panel">
  <summary> Import Fingerprint Attendance File</summary>
<label> <h2>Select Dates </h2></label>

  <div class="form-grid two">
  <div class="date">
    <div class="date-wrapper">
  <span class="date-label">Start Date</span>
 <input type="date" id="previewStart"/>
</div> 
</div>

<div class="date">
      <div class="date-wrapper">
  <span class="date-label">End Date</span>
 <input type="date" id="previewEnd" />
  </div>
</div>
</div><br>

<button onclick="applyPreviewFilter()" style="width: 100%">Confirm Provided Date </button>
<br><br><br>

<div class="form-grid two">
<label for="file" class="file-upload"  id="uploadAttendance" accept=".xls,.xlsx"> 
  Select Attendance File
</label>

<input id="file" type="file" />

<button onclick="handleFile()" >Upload Attendance</button><br><br>
</div>

<div id="previewContainer"></div><br>

<button onclick="confirmImport()">Confirm</button>
<button onclick="cancelImport()">Cancel</button><br><br>

</details>

  <label>
  <input type="checkbox" id="holidayToggle">
  Mark this day as Holiday / No School
</label><br><br>

<div class="card">
<div id="attendanceTable" class="student-grid"></div><br><br>
</div>

  <div class="save-btn two">  
<button onclick="markUnmarkedAsAbsent()">Mark Remaining Students Absent</button>

    <button onclick="submitAttendance()">Save / Update</button>
	</div><br>
    
  <div class="xpt-btn">
      <button  onclick="exportMonthlyReport()">Export Monthly Report</button><br>

  </div>

</div>

 <div class="bottom-nav">

  <button class="nav-item"onclick="window.location.href='index.html'">
    <span>🏠</span>
    <small>Home</small>
  </button>

  <button class="nav-item" onclick="window.location.href='students.html'">
    <span>📝</span>
    <small>Students</small>
  </button>

  <button class="nav-item" onclick="window.location.href='registered-students.html'">
    <span>👨‍🎓</span>
    <small>Registered</small>
  </button>

  <button class="nav-item active" onclick="window.location.href='attendance.html'">
    <span>📋</span>
    <small>Attendance</small>
  </button>

  <button class="nav-item" onclick="window.location.href='performance.html'">
    <span>⭐</span>
    <small>Performance</small>
  </button>

</div>

  
</body>
</html>
